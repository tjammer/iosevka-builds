[buildPlans.IosevkaNeat]
family = "Iosevka Neat"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.IosevkaNeat.variants]
  inherits = "ss14"

    [buildPlans.IosevkaNeat.variants.design]
    one = "no-base"
    two = "straight-neck-serifless"
    three = "two-arcs"
    four = "semi-open-serifless"
    five = "upright-arched-serifless"
    six = "straight-bar"
    seven = "straight-serifless"
    eight = "crossing"
    nine = "straight-bar"
    zero = "dotted"
    capital-c = "bilateral-inward-serifed"
    capital-g = "toothless-corner-inward-serifed-hooked"
    capital-k = "symmetric-touching-serifless"
    capital-q = "crossing"
    capital-w = "straight-almost-flat-top-serifless"
    b = "toothless-corner-serifless"
    c = "bilateral-inward-serifed"
    g = "single-storey-earless-corner"
    i = "serifed"
    k = "symmetric-touching-serifless"
    l = "serifed"
    m = "earless-single-arch-serifless"
    n = "earless-corner-straight-serifless"
    q = "earless-corner-straight-serifless"
    r = "compact-serifless"
    t = "flat-hook-short-neck"
    w = "straight-almost-flat-top-serifless"
    y = "straight-serifless"
    punctuation-dot = "round"
    paren = "large-contour"
    brace = "curly"
    number-sign = "upright"
    ampersand = "et-toothless-corner"
    at = "fourfold"
    percent = "rings-segmented-slash"
    question = "smooth"

    [buildPlans.IosevkaNeat.variants.italic]
    one = "no-base"
    three = "two-arcs"
    four = "semi-open-serifless"
    five = "oblique-arched-serifless"
    six = "open-contour"
    seven = "bend-serifless"
    eight = "crossing"
    nine = "open-contour"
    zero = "oval-dotted"
    capital-k = "symmetric-connected-serifless"
    capital-w = "straight-serifless"
    a = "single-storey-earless-corner-serifed"
    b = "toothless-corner-serifless"
    g = "single-storey-earless-corner"
    i = "tailed-serifed"
    j = "serifed"
    k = "cursive-serifless"
    l = "tailed-serifed"
    m = "earless-single-arch-serifless"
    n = "earless-corner-straight-serifless"
    q = "earless-corner-straight-serifless"
    t = "bent-hook-short-neck"
    x = "cursive"
    y = "cursive-serifless"
    brace = "curly"
    number-sign = "upright"
    ampersand = "et-toothless-corner"
    percent = "rings-segmented-slash"

[buildPlans.IosevkaNeat.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaNeat.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaNeat.widths.Normal]
shape = 540
menu = 5
css = "normal"

[buildPlans.IosevkaNeat.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaNeat.slopes.Italic]
angle = 11.8
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.IosevkaNeat.metricOverride]
xHeight = 520
cap = 690
ascender = 740
sb = 85

accentWidth = 182
accentClearance = 76
accentHeight = 162
accentStackOffset = 208

leading = 1250
parenSize = 860
dotSize = 'blend(weight, [100, 110], [400, 125], [900, 150])'
periodSize = 140

essRatio = 1.03
essRatioUpper = 1.03
essRatioLower = 1.03
essRatioQuestion = 1.03
archDepth = 152
smallArchDepth = 157
